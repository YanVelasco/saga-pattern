server:
  port: 3000

spring:

  data:
    mongodb:
      uri: mongodb://admin:123456@localhost:27017/order_db?authSource=admin
      database: order_db
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    topic:
      teste: teste
    consumer:
      group-id: order-group
      auto-offset-reset: latest

logging:
  level:
    org:
      apache:
        kafka: off
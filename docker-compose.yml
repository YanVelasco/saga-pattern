services:

  order_db:
    image: mongo:7
    container_name: order_db
    restart: always
    networks:
      - orchestrator-saga
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123456
    ports:
      - "27017:27017"
    volumes:
      - order_db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  product_db:
    image: postgres:16-alpine
    container_name: product_db
    restart: always
    networks:
      - orchestrator-saga
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: product_db
    ports:
      - "5432:5432"
    volumes:
      - product_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d product_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  payment_db:
    image: postgres:16-alpine
    container_name: payment_db
    restart: always
    networks:
      - orchestrator-saga
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d payment_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory_db:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: always
    networks:
      - orchestrator-saga
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: inventory_db
    ports:
      - "5434:5432"
    volumes:
      - inventory_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d inventory_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    container_name: kafka
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.18
    restart: "no"
    user: root
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://kafka:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr kafka:33145
      - --advertise-rpc-addr kafka:33145
      - --mode dev-container
      - --smp 1
      - --reserve-memory 0M
      - --overprovisioned
    ports:
      - "2181:2181"
      - "9092:9092"
      - "18081:18081"
      - "18082:18082"
    networks:
      - orchestrator-saga
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  redpanda-console:
    container_name: redpanda
    image: docker.redpanda.com/redpandadata/console:v2.3.8
    restart: on-failure
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    ports:
      - "8081:8080"
    networks:
      - orchestrator-saga
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["kafka:29092"]
          schemaRegistry:
            enabled: true
            urls: ["http://kafka:8081"]
    depends_on:
      kafka:
        condition: service_healthy

  order-service:
    build: './order-service'
    container_name: order-service
    restart: always
    depends_on:
      - kafka
      - order_db
    networks:
      - orchestrator-saga
    environment:
      - KAFKA_BROKER=kafka:29092
      - MONGO_DB_URI=mongodb://admin:123456@order_db:27017/order_db?authSource=admin
    ports:
      - "3000:3000"

  orquestrator-service:
    build: './orchestrator-service'
    container_name: orchestrator-service
    restart: always
    depends_on:
      - kafka
      - order-service
      - product-validation-service
      - payment-service
      - inventory-service
    networks:
      - orchestrator-saga
    environment:
      - KAFKA_BROKER=kafka:29092
    ports:
      - "8080:8080"

  product-validation-service:
    build: './product-validation-service'
    container_name: product-validation-service
    restart: always
    depends_on:
      - kafka
      - product_db
    networks:
      - orchestrator-saga
    environment:
        - KAFKA_BROKER=kafka:29092
        - DB_HOST=product_db
        - DB_PORT=5432
        - DB_NAME=product_db
        - DB_USER=admin
        - DB_PASSWORD=123456
    ports:
      - "8090:8090"

  payment-service:
      build: './payment-service'
      container_name: payment-service
      restart: always
      depends_on:
          - kafka
          - payment_db
      networks:
          - orchestrator-saga
      environment:
          - KAFKA_BROKER=kafka:29092
          - DB_HOST=payment_db
          - DB_PORT=5432
          - DB_NAME=payment_db
          - DB_USER=admin
          - DB_PASSWORD=123456
      ports:
          - "8091:8091"

  inventory-service:
    build: './inventory-service'
    container_name: inventory-service
    restart: always
    depends_on:
        - kafka
        - inventory_db
    networks:
        - orchestrator-saga
    environment:
        - KAFKA_BROKER=kafka:29092
        - DB_HOST=inventory_db
        - DB_PORT=5432
        - DB_NAME=inventory_db
        - DB_USER=admin
        - DB_PASSWORD=123456
    ports:
        - "8092:8092"

networks:
  orchestrator-saga:
    driver: bridge

volumes:
  redpanda-data:
  order_db:
  product_db:
  payment_db:
  inventory_db: